<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Figurability | Bioinformatics Visualization Gallery</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		:root {
			color-scheme: light dark;
			--bg-main: #f3f6f8;
			--bg-accent: radial-gradient(circle at 10% 20%, rgba(9, 132, 227, 0.14), transparent 40%),
									 radial-gradient(circle at 80% 0%, rgba(245, 124, 0, 0.12), transparent 35%),
									 linear-gradient(160deg, #f3f6f8 0%, #ffffff 100%);
			--text-main: #0f172a;
			--text-subtle: #334155;
			--card-bg: rgba(255, 255, 255, 0.8);
			--card-border: rgba(15, 23, 42, 0.12);
			--chip-bg: rgba(2, 132, 199, 0.1);
			--chip-text: #075985;
			--btn-primary: #0f766e;
			--btn-primary-hover: #115e59;
			--btn-secondary: #9a3412;
			--btn-secondary-hover: #7c2d12;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg-main: #07111b;
				--bg-accent: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.18), transparent 42%),
										 radial-gradient(circle at 78% 0%, rgba(251, 146, 60, 0.18), transparent 35%),
										 linear-gradient(145deg, #07111b 0%, #0f1f2e 100%);
				--text-main: #e2e8f0;
				--text-subtle: #cbd5e1;
				--card-bg: rgba(15, 23, 42, 0.72);
				--card-border: rgba(148, 163, 184, 0.25);
				--chip-bg: rgba(56, 189, 248, 0.18);
				--chip-text: #bae6fd;
				--btn-primary: #0d9488;
				--btn-primary-hover: #0f766e;
				--btn-secondary: #c2410c;
				--btn-secondary-hover: #9a3412;
			}
		}

		body {
			background: var(--bg-accent);
			color: var(--text-main);
			min-height: 100vh;
			font-family: "Manrope", "SF Pro Display", "Segoe UI", sans-serif;
			letter-spacing: 0.01em;
		}

		.glass {
			background: var(--card-bg);
			border: 1px solid var(--card-border);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
		}

		.card-enter {
			opacity: 0;
			transform: translateY(10px) scale(0.98);
			animation: cardIn 0.45s ease forwards;
		}

		@keyframes cardIn {
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}
	</style>
</head>
<body>
	<div class="mx-auto max-w-7xl px-4 py-8 md:px-8 md:py-12">
		<header class="mb-8 rounded-2xl p-6 md:p-8 glass">
			<div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
				<div>
					<p class="text-sm tracking-[0.16em] uppercase" style="color: var(--text-subtle);">Bioinformatics Visualization Atlas</p>
					<h1 class="mt-2 text-3xl font-extrabold md:text-5xl">Figurability</h1>
					<p class="mt-3 max-w-2xl text-sm md:text-base" style="color: var(--text-subtle);">
						A curated gallery of reusable scientific plotting templates with source code and demo-ready data.
					</p>
				</div>
				<div class="w-full max-w-lg">
					<label for="searchInput" class="mb-2 block text-sm font-medium" style="color: var(--text-subtle);">Search by chart name</label>
					<input
						id="searchInput"
						type="text"
						placeholder="Try: sankey, ribbon, correlation..."
						class="w-full rounded-xl border px-4 py-3 text-sm outline-none transition"
						style="background: rgba(255,255,255,0.08); border-color: var(--card-border); color: var(--text-main);"
					/>
				</div>
			</div>

			<div id="categoryBar" class="mt-5 flex flex-wrap gap-2"></div>
		</header>

		<main>
			<section id="status" class="mb-4 text-sm" style="color: var(--text-subtle);"></section>
			<section id="galleryGrid" class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-3"></section>
			<section id="emptyState" class="hidden rounded-2xl p-8 text-center glass">
				<h2 class="text-xl font-bold">No matching charts</h2>
				<p class="mt-2 text-sm" style="color: var(--text-subtle);">Try another keyword or switch to a different category.</p>
			</section>
		</main>

		<footer class="mt-10 border-t pt-6 text-center text-sm" style="border-color: var(--card-border); color: var(--text-subtle);">
			Created with ❤️ by Zephyr
		</footer>
	</div>

	<script>
		const state = {
			allItems: [],
			activeCategory: "All",
			searchText: ""
		};

		const els = {
			categoryBar: document.getElementById("categoryBar"),
			searchInput: document.getElementById("searchInput"),
			galleryGrid: document.getElementById("galleryGrid"),
			emptyState: document.getElementById("emptyState"),
			status: document.getElementById("status")
		};

		function escapeHtml(text) {
			return String(text)
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;");
		}

		function getCategories(items) {
			const set = new Set(items.map(item => item.category).filter(Boolean));
			return ["All", ...Array.from(set).sort((a, b) => a.localeCompare(b))];
		}

		function renderCategoryButtons(categories) {
			els.categoryBar.innerHTML = categories.map(category => {
				const active = state.activeCategory === category;
				const style = active
					? "background: var(--btn-primary); color: #ffffff; border-color: transparent;"
					: "background: transparent; color: var(--text-subtle); border-color: var(--card-border);";
				return `
					<button
						class="rounded-full border px-4 py-2 text-sm font-semibold transition hover:opacity-85"
						style="${style}"
						data-category="${escapeHtml(category)}"
						type="button"
					>${escapeHtml(category)}</button>
				`;
			}).join("");
		}

		function filterItems() {
			const search = state.searchText.trim().toLowerCase();
			return state.allItems.filter(item => {
				const byCategory = state.activeCategory === "All" || item.category === state.activeCategory;
				const bySearch = !search || item.chart_name.toLowerCase().includes(search);
				return byCategory && bySearch;
			});
		}

		function renderCards(items) {
			els.galleryGrid.innerHTML = items.map((item, index) => {
				const codeBtn = item.code_path
					? `<a href="${escapeHtml(item.code_path)}" class="rounded-lg px-3 py-2 text-sm font-semibold text-white transition hover:opacity-90" style="background: var(--btn-primary);">👉 获取代码</a>`
					: `<span class="rounded-lg px-3 py-2 text-sm font-semibold opacity-50" style="background: var(--chip-bg); color: var(--chip-text);">代码缺失</span>`;

				const dataBtn = item.data_path
					? `<a href="${escapeHtml(item.data_path)}" class="rounded-lg px-3 py-2 text-sm font-semibold text-white transition hover:opacity-90" style="background: var(--btn-secondary);">📦 示例数据</a>`
					: `<span class="rounded-lg px-3 py-2 text-sm font-semibold opacity-50" style="background: var(--chip-bg); color: var(--chip-text);">数据缺失</span>`;

				return `
					<article class="card-enter overflow-hidden rounded-2xl glass" style="animation-delay: ${Math.min(index * 0.04, 0.4)}s;">
						<img
							src="${escapeHtml(item.image_path)}"
							alt="${escapeHtml(item.chart_name)} preview"
							loading="lazy"
							class="h-56 w-full object-cover"
							onerror="this.style.opacity='0.2'; this.alt='preview unavailable';"
						/>
						<div class="p-4">
							<div class="inline-block rounded-full px-3 py-1 text-xs font-semibold" style="background: var(--chip-bg); color: var(--chip-text);">
								${escapeHtml(item.category)}
							</div>
							<h3 class="mt-3 text-lg font-bold">${escapeHtml(item.chart_name)}</h3>
							<div class="mt-4 flex items-center gap-2">${codeBtn}${dataBtn}</div>
						</div>
					</article>
				`;
			}).join("");

			els.emptyState.classList.toggle("hidden", items.length > 0);
		}

		function render() {
			const filtered = filterItems();
			renderCards(filtered);
			els.status.textContent = `Showing ${filtered.length} of ${state.allItems.length} chart(s)`;
			renderCategoryButtons(getCategories(state.allItems));
		}

		async function init() {
			try {
				const response = await fetch("./gallery_data.json", { cache: "no-cache" });
				if (!response.ok) {
					throw new Error(`HTTP ${response.status}`);
				}
				state.allItems = await response.json();
				render();
			} catch (error) {
				els.status.textContent = `Failed to load gallery data: ${error.message}`;
				els.galleryGrid.innerHTML = "";
				els.emptyState.classList.remove("hidden");
			}
		}

		els.searchInput.addEventListener("input", (event) => {
			state.searchText = event.target.value;
			render();
		});

		els.categoryBar.addEventListener("click", (event) => {
			const button = event.target.closest("button[data-category]");
			if (!button) {
				return;
			}
			state.activeCategory = button.dataset.category;
			render();
		});

		init();
	</script>
</body>
</html>
